<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro - Biblioteca Omillan</title>

  <link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">

  <!-- ESTILOS IGUALES AL LOGIN -->
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');
      background-size: cover;
      background-position: center;
    }

    .login-card {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 50px;
      color: #1b4332;
    }

    .titulo {
      font-weight: bold;
      color: #1b4332;
    }

    .form-control {
      border-radius: 10px;
    }

    .input-group-text {
      background: #1b4332;
      color: white;
      border: none;
    }

    .btn-register {
      background: #1b4332;
      color: white;
      border-radius: 10px;
      padding: 8px 20px;
      transition: 0.3s;
    }

    .btn-register:hover {
      background: #2d6a4f;
      color: white;
    }

    a {
      color: #1b4332;
      font-weight: 500;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>

</head>

<body>

<main class="d-flex justify-content-center align-items-center vh-100">

  <div class="login-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <i class="bi bi-book-half logo"></i>
      <h2 class="titulo">Registro</h2>
      <p class="text-muted">Crea tu cuenta en Biblioteca Omillan</p>
    </div>

    <!-- FORMULARIO FUNCIONAL -->
    <form method="POST" action="registro_usuario.php">

      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-person"></i>
          </span>
          <input class="form-control" name="nombre" placeholder="Tu nombre" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-envelope"></i>
          </span>
          <input class="form-control" name="email" placeholder="Tu email" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock"></i>
          </span>
          <input class="form-control" type="password" name="pwd" placeholder="Tu contraseña" required>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-4">
        <div>
          <span class="small text-muted">¿Ya tienes cuenta?</span>
          <a href="index.html">Iniciar sesión</a>
        </div>

        <button type="submit" class="btn btn-register">
          <i class="bi bi-person-plus"></i> Registrarse
        </button>
      </div>

    </form>

  </div>

</main>

</body>
</html>
